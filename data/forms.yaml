# 우슈 품세 카탈로그 — 中国武术段位制 (CWA Duan Wei System) 검증 데이터
#
# 출처: 高等教育出版社 《中国武术段位制系列教程》 (CWA 公式)
#       国家体育总局 公式 PDF
#       高等교육出版社 카탈로그 xuanshu.hep.com.cn
#       CWA 公式 段位制 포털 dw.wushu.com.cn
#
# 원칙:
#   1. 段位制 公式 教程에 standalone 套路로 존재하는 것만 등록
#   2. 검증된 정보만 ai_guidelines에 채움. 미검증은 "VERIFICATION PENDING" 명시
#   3. IWUF 시합용 国際规정套路 (1989-1991, 36식 도술 등)는 포함하지 않음
#   4. 24式 太极拳은 段위制 아니지만 foundational로 포함, 그 사실 명시

shooting_guide:
  ko:
    - "정면에서 촬영 (카메라가 본인 앞쪽 약 3m)"
    - "전신이 화면에 들어오게 (머리부터 발 끝까지)"
    - "횡촬(가로 모드), 1080p 또는 720p, 30fps"
    - "조명 균일, 단순한 배경, 거울/반사물 피하기"
    - "처음부터 끝까지 한 컷 (편집 X)"
  zh:
    - "正面拍摄(摄像头在您前方约 3 米)"
    - "全身入镜(从头到脚)"
    - "横拍(横屏),1080p 或 720p,30fps"
    - "光线均匀,背景简洁,避开镜面/反光物"
    - "从头到尾一镜到底(不要剪辑)"

