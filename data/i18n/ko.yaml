app:
  title: 우슈 평가 워크벤치
  subtitle: 武术评估工作台
  tagline: AI 모션 인식 우슈 품세 채점 시스템
  language_toggle: 言語
  brand: 우슈 워크벤치
  dev_badge: 🔧 개발 단계
  dev_notice_short: 앱 출시 전 AI 학습용 내부 도구입니다
  dev_notice_long: |
    이 워크벤치는 **모바일 앱 출시 전 AI를 학습·튜닝하기 위한 내부 도구**입니다.
    학생용 실제 앱은 이 워크벤치와는 별도로 개발됩니다.
    여기서 자문가가 등록한 시범 영상과 의견은 모두 최종 앱의 기반이 됩니다.

