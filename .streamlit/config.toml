[theme]
primaryColor = "#C0392B"
backgroundColor = "#FAF7F2"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1F1B16"
font = "sans serif"

[server]
maxUploadSize = 500
enableXsrfProtection = true
enableCORS = false
runOnSave = false

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
